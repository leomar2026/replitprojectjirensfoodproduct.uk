<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#b91c1c" />
  <title>Offline — Jiren's Food Product</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: #fffaf2;
      color: #202020;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }
    .card { max-width: 380px; width: 100%; }
    img { width: 110px; height: 110px; object-fit: contain; margin: 0 auto 24px; display: block; }
    h1 { font-size: clamp(24px, 6vw, 32px); margin: 0 0 12px; font-weight: 900; }
    p { color: rgba(32,32,32,.62); line-height: 1.6; margin: 0 0 24px; font-size: 16px; }
    button {
      background: #b91c1c;
      color: white;
      border: 0;
      border-radius: 8px;
      padding: 14px 28px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      width: 100%;
      min-height: 50px;
    }
    button:hover { background: #991b1b; }
  </style>
</head>
<body>
  <div class="card">
    <img src="/jirens-logo.png" alt="Jiren's Food Product" />
    <h1>You're offline</h1>
    <p>Please check your internet connection and try again. Your cart is saved and will be ready when you reconnect.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
